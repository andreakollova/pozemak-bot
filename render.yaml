services:
  - type: worker
    name: pozemak-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEBSITE_API_URL
        sync: false
      - key: WEBSITE_API_KEY
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: POLL_INTERVAL
        value: "300"
